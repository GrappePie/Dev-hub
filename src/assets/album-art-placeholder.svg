<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <style>
      .bar1 { animation: eq1 0.8s ease-in-out infinite alternate; transform-origin: 26px 48px; }
      .bar2 { animation: eq2 0.6s ease-in-out infinite alternate; transform-origin: 32px 48px; }
      .bar3 { animation: eq3 1.0s ease-in-out infinite alternate; transform-origin: 38px 48px; }
      .note { animation: pulse 1.4s ease-in-out infinite alternate; }
      @keyframes eq1 { from { transform: scaleY(0.2); } to { transform: scaleY(1); } }
      @keyframes eq2 { from { transform: scaleY(0.5); } to { transform: scaleY(1); } }
      @keyframes eq3 { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
      @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
  </defs>
  <rect width="64" height="64" fill="#1a1a2e"/>
  <rect x="0" y="0" width="64" height="2" fill="#2d2d4e"/>
  <rect x="0" y="62" width="64" height="2" fill="#2d2d4e"/>
  <rect x="0" y="0" width="2" height="64" fill="#2d2d4e"/>
  <rect x="62" y="0" width="2" height="64" fill="#2d2d4e"/>
  <g class="note">
    <rect x="34" y="14" width="3" height="14" fill="#818cf8"/>
    <rect x="34" y="14" width="8" height="3" fill="#818cf8"/>
    <rect x="37" y="17" width="5" height="3" fill="#818cf8"/>
    <rect x="28" y="26" width="3" height="2" fill="#818cf8"/>
    <rect x="26" y="28" width="7" height="3" fill="#818cf8"/>
    <rect x="28" y="31" width="3" height="2" fill="#818cf8"/>
  </g>
  <rect class="bar1" x="24" y="32" width="4" height="16" fill="#6366f1"/>
  <rect class="bar2" x="30" y="32" width="4" height="16" fill="#818cf8"/>
  <rect class="bar3" x="36" y="32" width="4" height="16" fill="#4f46e5"/>
  <rect x="20" y="48" width="24" height="2" fill="#2d2d4e"/>
</svg>
