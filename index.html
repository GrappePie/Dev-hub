<script>
// AudioContext interceptor: kept minimal — Spotify/SoundCloud use DRM/native audio
// that bypasses Web Audio API. getDisplayMedia is used instead for those platforms.
// This interceptor is only useful if future platforms use Web Audio directly.
(function () {
  if (!window.AudioNode) return;
  var _ctxMap = new Map();
  var _origConnect = AudioNode.prototype.connect;
  AudioNode.prototype.connect = function () {
    var dest = arguments[0];
    var ctx = this.context;
    if (dest && ctx && dest === ctx.destination && !ctx.__devhubOwned) {
      if (!_ctxMap.has(ctx)) {
        try {
          var a = ctx.createAnalyser();
          a.fftSize = 1024;
          a.smoothingTimeConstant = 0.85;
          _origConnect.call(a, dest);
          _ctxMap.set(ctx, a);
        } catch (e) {}
      }
      var analyser = _ctxMap.get(ctx);
      if (analyser && analyser !== this) {
        try { _origConnect.call(this, analyser, arguments[1] || 0, 0); } catch (e) {}
      }
    }
    return _origConnect.apply(this, arguments);
  };
  window.__audioInterceptor = {
    getLatestAnalyser: function () {
      var best = null; var bestPeak = -1;
      _ctxMap.forEach(function (a) {
        try {
          var buf = new Uint8Array(a.frequencyBinCount);
          a.getByteFrequencyData(buf);
          var peak = 0;
          for (var i = 0; i < buf.length; i++) { if (buf[i] > peak) peak = buf[i]; }
          if (peak > bestPeak) { bestPeak = peak; best = a; }
        } catch (e) {}
      });
      if (!best) _ctxMap.forEach(function (a) { best = a; });
      return best;
    }
  };
})();
</script>
